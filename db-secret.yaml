# Kubernetes API バージョン
apiVersion: v1

# リソースの種類：Secret（機密情報を安全に保存するオブジェクト）
# ConfigMap と似ているが、パスワードなど秘密のデータ用
kind: Secret

# Secret のメタデータ（情報）
metadata:
  # Secret の名前（Kubernetes内で一意に識別される）
  name: db-secret

# Secret のタイプ
# Opaque = 「任意のデータ」という意味
# つまり：パスワード、トークン、証明書など、どんな秘密情報でも格納可能
type: Opaque

# Secret の データ（機密情報）
# 注意：ここのデータは Base64 エンコード（暗号化ではない）
# Base64 は「誰でもデコードできる」ので、本当の保護は Kubernetes の RBAC や etcd の暗号化に頼る
data:
  # キー：username
  # 値：cG9zdGdyZXM= (これは 'postgres' を Base64 エンコードしたもの)
  # つまり：ユーザー名は 'postgres'
  username: cG9zdGdyZXM=

  # キー：password
  # 値：bXlwYXNzd29yZDEyMw== (これは 'mypassword123' を Base64 エンコードしたもの)
  # つまり：パスワードは 'mypassword123'
  password: bXlwYXNzd29yZDEyMw==
