apiVersion: v1
kind: Pod
metadata:
  name: app-pod-env
spec:
  containers:
  - name: busybox
    image: busybox:latest
    command: ['sh', '-c', 'echo "DB Host: $DATABASE_HOST"; echo "DB Port: $DATABASE_PORT"; sleep 3600']
    env:
    - name: DATABASE_HOST
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: database_host
    - name: DATABASE_PORT
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: database_port